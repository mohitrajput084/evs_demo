spring.application.name=evs

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/evs_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=evs_user
spring.datasource.password=Evs@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# Automatically update DB schema based on entities
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in console
spring.jpa.show-sql=true

# Dialect for MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Format SQL output (optional)
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always


# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8181

# JWT Configuration
jwt.secret=3u3T4s9vQ1zX6wL0pK8mY2rB7hG5jF4eV1cW6nP8tR3yZ9xK
jwt.expiration=3600000

